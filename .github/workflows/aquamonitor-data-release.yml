name: Build and Release aquamonitor-data

on:
  push:
    tags:
      - 'aquamonitor-data-*'  # Triggers on tags like aquamonitor-data-1.0.0
  workflow_dispatch:  # Allows manual triggering from GitHub UI

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Build and deploy
      run: mvn -s $GITHUB_WORKSPACE/.github/workflows/maven-settings.xml clean deploy -DskipTests
      working-directory: aquamonitor-data
      env:
          USER_NAME: ${{ secrets.MVN_USER }}
          ACCESS_TOKEN: ${{ secrets.MVN_TOKEN }}
